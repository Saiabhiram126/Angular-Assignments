<mat-card class="list-card">
  <mat-card-header>
    <mat-card-title>Employee List</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <!-- Search Filter -->
    <div class="search-container">
      <mat-form-field appearance="outline" class="search-field">
        <mat-label>Search by name</mat-label>
        <input matInput [(ngModel)]="searchTerm" (ngModelChange)="applyFilter()" placeholder="Enter employee name">
        <mat-icon matSuffix>search</mat-icon>
      </mat-form-field>
    </div>

    <!-- Employee Table -->
    <div class="table-container">
      <table mat-table [dataSource]="filteredEmployees" class="employee-table">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
          <th mat-header-cell *matHeaderCellDef>Name</th>
          <td mat-cell *matCellDef="let employee">{{ getFullName(employee) }}</td>
        </ng-container>

        <!-- Email Column -->
        <ng-container matColumnDef="email">
          <th mat-header-cell *matHeaderCellDef>Email</th>
          <td mat-cell *matCellDef="let employee">{{ employee.email }}</td>
        </ng-container>

        <!-- Department Column -->
        <ng-container matColumnDef="department">
          <th mat-header-cell *matHeaderCellDef>Department</th>
          <td mat-cell *matCellDef="let employee">{{ employee.department }}</td>
        </ng-container>

        <!-- Date of Joining Column -->
        <ng-container matColumnDef="dateOfJoining">
          <th mat-header-cell *matHeaderCellDef>Date of Joining</th>
          <td mat-cell *matCellDef="let employee">{{ employee.dateOfJoining | joiningDate }}</td>
        </ng-container>

        <!-- Actions Column -->
        <ng-container matColumnDef="actions">
          <th mat-header-cell *matHeaderCellDef>Actions</th>
          <td mat-cell *matCellDef="let employee">
            <button mat-icon-button color="warn" (click)="deleteEmployee(employee.id)" aria-label="Delete employee">
              <mat-icon>delete</mat-icon>
            </button>
          </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
      </table>

      <!-- No data message -->
      <div *ngIf="filteredEmployees.length === 0" class="no-data">
        <p>{{ searchTerm ? 'No employees found matching your search.' : 'No employees added yet.' }}</p>
      </div>
    </div>
  </mat-card-content>
</mat-card>
